<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <title>座標取得ツール</title>
    <style>
        /* --- 基本レイアウト --- */
        body {
            margin: 0;
            padding: 0;
            font-family: sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* 操作バー (2段構成に変更) */
        #controls {
            padding: 10px 15px;
            background: #2c3e50;
            color: white;
            display: flex;
            flex-direction: column;
            /* 縦並びにする */
            gap: 8px;
            /* 上段と下段の間隔 */
            height: auto;
            /* 高さを自動調整 */
            box-sizing: border-box;
            position: relative;
            z-index: 100;
        }

        /* 上段: 入力とボタン */
        .control-row-top {
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
            /* 狭すぎたら折り返す */
        }

        /* 下段: 情報表示 */
        .control-row-bottom {
            display: flex;
            align-items: center;
            justify-content: space-between;
            /* 両端揃え */
            font-size: 12px;
            color: #ddd;
            padding-top: 5px;
            border-top: 1px solid #34495e;
            /* 区切り線 */
        }

        .input-group {
            display: flex;
            gap: 5px;
            align-items: center;
        }

        input[type="text"] {
            padding: 6px;
            font-size: 14px;
            border-radius: 4px;
            border: none;
        }

        #address-input {
            width: 200px;
            /* 少しコンパクトに */
        }

        button {
            padding: 6px 10px;
            cursor: pointer;
            background: #3498db;
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 13px;
            font-weight: bold;
            white-space: nowrap;
            transition: background 0.2s;
        }

        button:hover {
            background: #2980b9;
        }

        /* 半径ボタン */
        .radius-group {
            display: flex;
            gap: 3px;
            align-items: center;
        }

        button.radius-btn {
            background: #7f8c8d;
            font-size: 11px;
            padding: 6px 8px;
        }

        button.radius-btn.active {
            background: #27ae60;
            border: 1px solid #fff;
        }

        #impossible-btn {
            background: #c0392b;
            margin-left: 5px;
        }

        #impossible-btn.active {
            background: #e74c3c;
            border: 2px solid #fff;
        }

        /* 設定メニュー */
        .settings-container {
            margin-left: auto;
            /* 右端に寄せる */
            position: relative;
        }

        #settings-btn {
            background: transparent;
            font-size: 20px;
            padding: 0 5px;
            color: #ecf0f1;
        }

        .dropdown-menu {
            display: none;
            position: absolute;
            top: 35px;
            right: 0;
            background-color: white;
            min-width: 220px;
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.2);
            border-radius: 4px;
            z-index: 1000;
            overflow: hidden;
        }

        .dropdown-menu.show {
            display: block;
        }

        .menu-item {
            padding: 10px 15px;
            display: block;
            color: #333;
            font-size: 13px;
            cursor: pointer;
            border-bottom: 1px solid #eee;
        }

        .menu-item:hover {
            background-color: #f1f1f1;
        }

        /* メインエリア */
        #main-container {
            display: flex;
            flex: 1;
            overflow: hidden;
            position: relative;
        }

        .layout-horizontal {
            flex-direction: row;
        }

        .layout-horizontal>div {
            width: 50%;
            height: 100%;
        }

        .layout-horizontal #work-area {
            border-right: 2px solid #2c3e50;
        }

        .layout-vertical {
            flex-direction: column;
        }

        .layout-vertical>div {
            width: 100%;
            height: 50%;
        }

        #work-area,
        #ref-area {
            position: relative;
        }

        #map {
            width: 100%;
            height: 100%;
        }

        #ref-frame {
            width: 100%;
            height: 100%;
            border: none;
        }

        .area-label {
            position: absolute;
            top: 10px;
            left: 10px;
            background: rgba(255, 255, 255, 0.95);
            padding: 4px 8px;
            z-index: 10;
            font-weight: bold;
            border-radius: 4px;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.2);
            pointer-events: none;
            font-size: 12px;
            color: #333;
        }

        /* 結果エリア */
        #result-area {
            height: 50px;
            background: #f8f9fa;
            border-top: 1px solid #ddd;
            display: flex;
            gap: 10px;
            align-items: center;
            justify-content: center;
            padding: 0 20px;
            box-sizing: border-box;
        }

        #output-text {
            font-family: monospace;
            font-size: 14px;
            padding: 6px;
            border: 1px solid #ccc;
            background: #fff;
            width: 100%;
            flex: 1;
        }

        #copy-btn {
            background: #e74c3c;
            width: 80px;
        }

        /* --- APIキー入力モーダル --- */
        #api-key-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            z-index: 9999;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .modal-content {
            background: white;
            padding: 40px;
            border-radius: 8px;
            width: 450px;
            text-align: center;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
        }

        .modal-content h2 {
            margin-top: 0;
            color: #2c3e50;
        }

        #api-key-input {
            width: 100%;
            padding: 10px;
            margin-bottom: 20px;
            box-sizing: border-box;
            font-size: 16px;
            border: 2px solid #ddd;
            border-radius: 4px;
        }

        #save-key-btn {
            width: 100%;
            background: #27ae60;
            color: white;
            padding: 10px;
            font-size: 16px;
            border: none;
            cursor: pointer;
            font-weight: bold;
            border-radius: 4px;
        }

        #list-panel {
            background: #eef3f7;
            border-top: 1px solid #cfd8df;
            border-bottom: 1px solid #cfd8df;
            padding: 10px 15px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        #list-panel h3 {
            margin: 0;
            font-size: 14px;
            color: #2c3e50;
        }

        .list-row {
            display: flex;
            gap: 8px;
            align-items: center;
            flex-wrap: wrap;
        }

        #list-tsv-input {
            width: 100%;
            box-sizing: border-box;
            min-height: 90px;
            resize: vertical;
            padding: 8px;
            border: 1px solid #bdc3c7;
            border-radius: 4px;
            font-size: 13px;
            font-family: monospace;
        }

        .list-column-input {
            width: 70px;
            padding: 6px;
            border: 1px solid #bdc3c7;
            border-radius: 4px;
        }

        .list-status {
            font-size: 12px;
            color: #34495e;
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }

        #list-message {
            font-size: 12px;
            color: #2c3e50;
            min-height: 16px;
        }

        #list-message.error {
            color: #c0392b;
        }

        #list-message.success {
            color: #27ae60;
        }
    </style>
</head>

<body>
    <div id="api-key-modal" style="display: none;">
        <div class="modal-content">
            <h2>初期設定</h2>
            <p style="color:#555; text-align:left; font-size:14px; line-height:1.5;">
                このツールを利用するには、ご自身の <strong>Google Maps APIキー</strong> が必要です。<br>
                詳細は<a href="help.html" target="_blank" style="color:#3498db; font-weight:bold;">ヘルプ</a>をご覧ください。
            </p>
            <input type="text" id="api-key-input" placeholder="AIzaSy... から始まるキーを入力">
            <button id="save-key-btn" onclick="saveApiKey()">利用を開始する</button>
        </div>
    </div>

    <section id="list-panel">
        <h3>一覧処理（TSV貼り付け）</h3>
        <textarea id="list-tsv-input" placeholder="スプレッドシートからコピーしたデータをここに貼り付け"></textarea>

        <div class="list-row">
            <label>住所列番号(1始まり): <input type="number" id="address-column-input" class="list-column-input" min="1" value="1"></label>
            <label>出力列番号(1始まり): <input type="number" id="output-column-input" class="list-column-input" min="1" value="5"></label>
            <button id="load-list-btn">一覧を読み込む</button>
            <button id="next-row-btn">次の未処理住所を表示</button>
            <button id="apply-current-btn">現在の出力文をこの行に反映</button>
            <button id="apply-next-btn">反映して次へ</button>
            <button id="copy-updated-tsv-btn">更新済み一覧をコピー</button>
        </div>

        <div class="list-status">
            <div>現在対象行: <strong id="current-row-display">-</strong></div>
            <div>現在対象住所: <strong id="current-address-display">-</strong></div>
            <div>総件数: <strong id="total-rows-display">0</strong></div>
            <div>未処理件数: <strong id="pending-rows-display">0</strong></div>
        </div>

        <div id="list-message"></div>
    </section>

    <div id="controls">
        <div class="control-row-top">
            <div class="input-group">
                <span style="font-size:18px;">🗺️</span>
                <input type="text" id="address-input" placeholder="住所を入力">
                <button id="search-btn">検索</button>

                <button id="header-copy-btn" onclick="copyToClipboard(this)"
                    style="background:#e67e22; margin-left:5px;" title="現在の結果をコピー">コピー</button>
            </div>

            <div class="radius-group">
                <button class="radius-btn" onclick="setRadius(50)">50m</button>
                <button class="radius-btn" onclick="setRadius(100)">100m</button>
                <button class="radius-btn active" onclick="setRadius(300)">300m</button>
                <button class="radius-btn" onclick="setRadius(500)">500m</button>
                <button class="radius-btn" onclick="setRadius(1000)">1km</button>
                <button id="impossible-btn" class="radius-btn" onclick="setImpossible()">不可</button>
            </div>

            <div class="settings-container">
                <button id="settings-btn" onclick="toggleSettings()" title="設定">⚙️</button>
                <div id="settings-menu" class="dropdown-menu">
                    <div class="menu-item" onclick="toggleAutoRadius()">📏 自動半径計算: <span id="auto-radius-status"
                            style="font-weight:bold; color:#27ae60;">ON</span></div>
                    <div class="menu-item" onclick="toggleLayout()">🔄 配置を切り替える</div>
                    <div class="menu-item" onclick="deleteApiKey()" style="color: #c0392b;">🗑️ APIキーを削除する</div>
                    <a href="https://github.com/Keisuke71" target="_blank" class="menu-item">👨‍💻 Developed by
                        k4.matsumoto</a>
                </div>
            </div>
        </div>

        <div class="control-row-bottom">
            <div id="calculated-radius-display">検出範囲: --</div>

            <div id="quota-display" style="text-align:right;"></div>
        </div>
    </div>

    <div id="main-container" class="layout-horizontal">
        <div id="work-area">
            <div class="area-label">👈 作業用</div>
            <div id="map"></div>
        </div>
        <div id="ref-area">
            <div class="area-label">👉 参照用 (境界線確認)</div>
            <iframe id="ref-frame" src="about:blank"></iframe>
        </div>
    </div>

    <div id="result-area">
        <span style="font-weight:bold; font-size:13px; white-space:nowrap;">出力:</span>
        <input type="text" id="output-text" readonly placeholder="地図をクリックしてピンを設置してください">
        <button id="copy-btn" onclick="copyToClipboard(this)">コピー</button>

        <script src="script.js"></script>

        <script>
            // ボタンイベントの紐付け（HTML内にJSを書く場合）
            document.getElementById('search-btn').addEventListener('click', geocodeAddress);
            document.getElementById('address-input').addEventListener('keydown', (e) => {
                if (e.key === 'Enter') geocodeAddress();
            });

            document.getElementById('load-list-btn').addEventListener('click', loadTsvList);
            document.getElementById('next-row-btn').addEventListener('click', showNextPendingAddress);
            document.getElementById('apply-current-btn').addEventListener('click', applyOutputToCurrentRow);
            document.getElementById('apply-next-btn').addEventListener('click', applyOutputAndMoveNext);
            document.getElementById('copy-updated-tsv-btn').addEventListener('click', copyUpdatedTsv);

            // Settings menu close handler is in script.js now, but kept safe here
        </script>
</body>

</html>
